<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المملكة العراقية</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيق الشعار ليكون أنيقاً ومتوسطاً */
        .royal-logo {
            width: 120px; 
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* تنسيق شريط الأخبار */
        .news-ticker {
            display: flex;
            background: #1a1a1a;
            color: #ffd700;
            padding: 10px;
            overflow: hidden;
            white-space: nowrap;
            border-top: 2px solid #ffd700;
            border-bottom: 2px solid #ffd700;
            margin: 10px 0;
            font-size: 14px;
        }
        .ticker-title {
            padding: 0 15px;
            font-weight: bold;
            flex-shrink: 0;
            border-left: 1px solid #ffd700;
        }
        .ticker-content {
            display: inline-block;
            padding-right: 100%;
            animation: ticker 40s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate(100%, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <!-- شريط الأخبار -->
    <div class="news-ticker">
        <div class="ticker-title">أخبار عاجلة:</div>
        <div id="ticker-content" class="ticker-content">جاري تحميل الأخبار...</div>
    </div>

    <!-- القائمة العلوية والأزرار -->
    <div class="header-container" style="background-color: #000; text-align: center; padding: 20px;">
        <!-- إضافة الشعار هنا -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Coat_of_arms_of_the_Kingdom_of_Iraq_%281921–1958%29.svg" alt="شعار المملكة العراقية" class="royal-logo">
        
        <h1 style="color: #ffd700; margin-bottom: 15px; margin-top: 0;">المملكة العراقية</h1>
        
        <div class="nav-buttons">
            <button id="btn-news" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">الرئيسية / الأخبار</button>
            <button id="btn-articles" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">المقالات</button>
            <button id="btn-kings" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">ملوك العراق</button>
            <button id="btn-documentaries" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">الوثائقيات</button>
            <button id="btn-photos" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">معرض الصور</button>
            <button id="btn-archive" style="background: none; border: none; color: #fff; margin: 0 10px; font-size: 16px; cursor: pointer;">الأرشيف</button>
        </div>
    </div>

    <!-- مكان عرض المحتوى التاريخي -->
    <div class="content-section" style="max-width: 800px; margin: 30px auto; padding: 0 20px;">
        <h2 style="color: #c5a059; text-align: center; margin-bottom: 25px;">المحتوى التاريخي</h2>
        <div id="articles-container">
            <!-- هنا ستظهر المنشورات تلقائياً -->
        </div>
    </div>

    <script>
        // كود جلب الأخبار
        const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://www.aljazeera.net/feed/";
        fetch(rssUrl)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('ticker-content');
                if(data.items) {
                    let titles = data.items.map(item => item.title).join(" | ");
                    container.innerHTML = titles;
                }
            })
            .catch(err => {
                document.getElementById('ticker-content').innerHTML = "تعذر تحميل الأخبار حالياً.";
            });
    </script>
    <script src="script.js"></script>
</body>
</html>
