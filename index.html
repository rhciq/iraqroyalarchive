<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المملكة العراقية</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#0d0d0d;
}

.royal-logo{
width:120px;
display:block;
margin:auto;
margin-bottom:10px;
}

.header-container{
background:#000;
text-align:center;
padding:20px;
position:relative;
box-shadow:0 5px 20px rgba(0,0,0,.5);
}

.menu-btn{
position:absolute;
top:20px;
right:20px;
background:none;
border:none;
color:#ffd700;
font-size:32px;
cursor:pointer;
transition:.3s;
}

.menu-btn:hover{
transform:rotate(90deg) scale(1.1);
text-shadow:0 0 20px gold;
}

.side-menu{
position:fixed;
top:0;
right:-280px;
width:260px;
height:100%;
background:#111;
transition:.35s;
box-shadow:-5px 0 25px rgba(0,0,0,.6);
padding-top:80px;
z-index:999;
}

.side-menu a{
display:block;
padding:18px 25px;
color:white;
text-decoration:none;
transition:.25s;
font-size:18px;
}

.side-menu a:hover{
background:#c5a059;
color:#000;
padding-right:35px;
box-shadow:0 0 20px rgba(197,160,89,.5);
}

.developer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:#c5a059;
}

.developer h3{
margin:5px 0;
color:#ffd700;
}

.content-section{
max-width:800px;
margin:30px auto;
padding:0 20px;
}
</style>

</head>

<body>

<div class="header-container">

<button class="menu-btn" id="menuBtn">☰</button>

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Coat_of_arms_of_the_Kingdom_of_Iraq_%281921–1958%29.svg" class="royal-logo">

<h1 style="color:#ffd700;margin:0;">
المملكة العراقية
</h1>

</div>

<div class="side-menu" id="sideMenu">

<a href="#" id="btn-news">🏠 الرئيسية / الأخبار</a>

<a href="#" id="btn-articles">📚 المقالات</a>

<a href="#" id="btn-kings">👑 ملوك العراق</a>

<a href="#" id="btn-documentaries">🎥 الوثائقيات</a>

<a href="#" id="btn-photos">🖼 معرض الصور</a>

<a href="#" id="btn-archive">🗂 الأرشيف</a>

<div class="developer">
<p>تطوير</p>
<h3>طه أحمد</h3>
<p>Instagram</p>
<p>@p2_e33</p>
</div>

</div>

<div class="content-section">

<h2 style="color:#c5a059;text-align:center;">
المحتوى التاريخي
</h2>

<div id="articles-container">
<!-- المنشورات -->
</div>

</div>

<script>
const menu=document.getElementById("sideMenu");
const btn=document.getElementById("menuBtn");

btn.onclick=function(){

if(menu.style.right=="0px"){
menu.style.right="-280px";
}else{
menu.style.right="0";
}

};
</script>

<script src="script.js"></script>

</body>
</html>
